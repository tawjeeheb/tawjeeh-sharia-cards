name: Card Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    name: فحص جودة البطاقات C1–C23
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install markdown weasyprint pyyaml 2>/dev/null || true

      - name: Validate all cards (C1–C23)
        run: |
          python scripts/run_card_pipeline.py --validate-all

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: outputs/quality_reports/
          if-no-files-found: ignore
